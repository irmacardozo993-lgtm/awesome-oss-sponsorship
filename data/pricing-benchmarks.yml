# data/pricing-benchmarks.yml
# Rate estimates for OSS sponsorship slots by star tier and slot type.
#
# *** ALL FIGURES ARE ESTIMATES / REFERENCE ONLY. ***
# There is no standardized public market tying $/month to star count. Real prices depend on
# vertical, traffic, user quality, conversion rate, audience geography, and sponsor budget.
# Use these as a starting internal anchor, not as a published price list.
#
# Anchored to verified real data points (see `anchors` below and docs/case-studies.md).

version: 1
verified_on: "2026-06-29"
disclaimer: "ESTIMATE / REFERENCE ONLY. Not a quote, not a guarantee. Re-derive from your own traffic and conversion data."

# ---------------------------------------------------------------------------
# Verified real-world anchors (these are facts, not estimates).
# Source: official OpenCollective pages, maintainer blogs, ad-platform pricing pages.
# ---------------------------------------------------------------------------
