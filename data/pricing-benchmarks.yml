# Deal-model price modifiers (apply on top of the slot base).
deal_model_modifiers:
  one_time_display_12mo: "~8–10× the monthly rate, discounted 15–20% vs paying monthly"
  annual_paid_yearly: "~10–12× monthly, discounted 15–20%"
  affiliate_pure: "$0 fixed; 10–30% recurring or $5–$50 flat per converted user (volume-dependent)"
  fixed_plus_affiliate: "lower fixed retainer (50–70% of slot base) + commission on conversions"
  in_kind_credits: "face-value of credits/services; log as sponsorship at fair-market value"

# How to re-derive your own number (always more credible than a star-tier table).
derivation_method:
  docs_site_ad: "monthly_pageviews / 1000 × ~$2.50 (EthicalAds publisher CPM)"
  newsletter: "subs × open_rate × CTR × target_cpc; or anchor to JS Weekly $3,590/180k-subs primary"
  readme_slot: "star_count is a proxy; real drivers = unique monthly visitors (GitHub Traffic) + npm/PyPI/Docker pulls + audience-to-sponsor fit"
  rule_of_thumb: "If you can't show traffic or conversion data, price at the LOW end of the range and raise after the first 3 closed deals."

# Region multipliers (estimate).
region_multipliers:
  global_usd: 1.0
  rmb_domestic: "multiply USD × 6–7 for RMB 'face' number, but domestic sponsors often pay in the ¥500–¥5,000/mo band for 1k-star repos (see README.zh-CN.md)"
