# ---------------------------------------------------------------------------
# Closed / sunset / dead — flag explicitly so readers don't waste time.
# ---------------------------------------------------------------------------
closed_programs:
  - name: Hetzner
    url: https://www.hetzner.com/legal/referrals
    status: sunset
    note: "Personal referral links valid only until 15 June 2026; now redirects to a generic €20 new-customer Cloud promo code (bonus valid until 31 Aug 2026). Original terms: €10 referrer + €20 new-customer Cloud credit. No cash. DEAD for new referrals as of June 2026. Existing earned credits redeemable until 31 Dec 2027."

  - name: Notion
    url: https://www.notion.com/affiliates
    status: closed
    note: "Hosted on PartnerStack. Up to $50/signup + 20% year-one revenue; 180-day cookie. Currently CLOSED to new applicants ('Program is currently not accepting new affiliates'). Existing affiliates remain."

  - name: ShareASale
    url: https://www.shareasale.com
    status: defunct
    note: "Acquired by Awin in 2017; shareasale.com closed 2025-10-06; fully merged into Awin. New affiliates sign up at awin.com. Skews consumer retail, not devtool."

  - name: Heroku
    url: https://www.heroku.com/partnering/
    status: dead
    note: "No public customer-facing referral program with cash commissions. Heroku Partner Program (Salesforce Consulting Partner track) = visibility/demo orgs/cert vouchers, no per-referral commissions. Heroku Enterprise subscriptions End of Sale for new customers (announced Feb 2026)."

# ---------------------------------------------------------------------------
# No public program found (verified absent at official site, 2026-06-29).
# Do NOT list these as affiliate programs despite third-party directory claims.
# ---------------------------------------------------------------------------
no_public_program:
  cloud_hosting: [Render, "Fly.io", Cloudflare, AWS]
  cloudflare_note: "Cloudflare = channel-only (PowerUP Partner Program, partner-portal rates not public); no individual affiliate. Warp+ referral credits ended Nov 2024."
  aws_note: "AWS = organization-only via AWS Partner Network (ACE/Solution Provider); no individual affiliate. Public 'AWS affiliate' pages misdirect to Amazon Associates (retail)."
  ai_api: [OpenAI, Anthropic, Replicate, "Together AI", OpenRouter, Mistral, Groq, "Hugging Face", DeepSeek]
  ai_api_note: "OpenAI Partner Network & Anthropic Claude Partner Network are B2B channel programs (enablement/training), explicitly no commissions. DeepSeek/Mistral Ambassador = API credits, not cash. Most AI API platforms have NO referral monetization."
  database_backend_monitoring: [Supabase, PlanetScale, Turso, Upstash, Sentry, PostHog, Meilisearch, Axiom]
  database_notes:
    - "Supabase: partners page is an integration marketplace, no referral credit system."
    - "Turso: Partner Program launched May 27 2026 ('earn revenue share') but discloses no rates — closed partner network, not a listable affiliate (status: unverified)."
    - "Upstash: $1,000/mo credit GRANT for accepted OSS projects (sponsorship), not a referral commission."
    - "Sentry: only a sponsored-account application (free/discounted for OSS/edu/startup), no affiliate."
    - "PostHog: explicitly states 'We do not have any official partners.'"
  dev_saas: [Linear, JetBrains, Egghead, "Frontend Masters", Zapier]
  dev_saas_notes:
    - "Linear: only a Startup Program (free via accelerator partners), no user-referral affiliate."
    - "JetBrains: reseller/consulting-training + Content Creators (free IDE access for bloggers, not commissions). Not on PartnerStack."
    - "Egghead & Frontend Masters (now Master.dev): no affiliate program; deliberately avoid affiliate links."
    - "Zapier: referral benefit restricted to certified Solution Partners with a professional website; no open affiliate signup."
  github: "GitHub itself has NO public referral/affiliate/reseller-commission program (verified across github.com/partners, Copilot Partner Program, third-party directories). GitHub Sponsors is donations, not affiliate. Individual OSS authors cannot earn referral commissions on GitHub paid plans."

# ---------------------------------------------------------------------------
# Affiliate networks an OSS author can join as a publisher.
# ---------------------------------------------------------------------------
networks:
  - name: PartnerStack
    url: https://partnerstack.com
    marketplace: https://market.partnerstack.com
    best_for: "Best for devtool/SaaS offers — 2,500+ programs, devtool-dense."
    signup: "Free, open self-service via dash.partnerstack.com; no invite needed. Apply to each brand individually."
    payout: "PayPal, Stripe, direct deposit via Airwallex. Min withdrawal $5 USD. Commissions available ~13th of following month."
    hosted_devtool_programs: ["Netlify (20% recurring)", "n8n (30% yr1)", "ElevenLabs (22%/11%)", "Bright Data (50% up to $1K/customer)", "Notion (closed to new)"]

  - name: Impact
    url: https://impact.com
    best_for: "Broad cross-brand marketplace; less devtool-dense than PartnerStack, more consumer/marketing SaaS."
    signup: "Free, open self-service publisher signup; platform reviews. No hard traffic minimum."
    payout: "Bank deposit (ACH/EFT), PayPal (2% capped $20), wire. Min $10 USD. US W-9 required at $2,000/yr."
    hosted_examples: [Shopify, Semrush, Canva, Hostinger, airSlate]

  - name: Lemon Squeezy
    url: https://www.lemonsqueezy.com
    best_for: "Merchant of Record with per-merchant affiliate feature (acquired by Stripe Jul 2024, still active). Popular with indie/dev SaaS."
    signup: "No central sign-up — join each merchant's program individually. Merchants control approval + rates."
    payout: "Bank or PayPal, ~$10 min, bi-monthly with 30-day hold. ~2% fee on referred sales."
    note: "Not a browsable network directory — you promote a specific product whose creator enabled Lemon Squeezy affiliates."

  - name: Rewardful
    url: https://www.rewardful.com
    best_for: "Affiliate INFRASTRUCTURE for SaaS (integrates Stripe/Paddle); per-merchant, not a marketplace."
    signup: "No central sign-up. Invited by / apply to a specific SaaS's Rewardful-powered program (affiliates.<brand>.com)."
    hosted_devtool_programs: ["Raycast (30% Pro)", "Replit", "HeyGen", "Clay", "Beehiiv", "Baremetrics", "Transistor"]
    note: "Browserless integrates with Rewardful via n8n automations, not a Rewardful-hosted program."

  - name: Tolt
    url: https://tolt.com
    best_for: "Affiliate software for SaaS startups (Stripe/Paddle/Chargebee); per-merchant."
    signup: "No central sign-up. Each SaaS chooses auto-approve or apply-for-access; join via <brand>.tolt.io."
    payout: "PayPal, Wise, Payoneer; NET-30 typical. Min commonly $50 (some $25)."
    hosted_examples: ["Typefully", "Fathom Analytics", "Parsio", "Folk.app", "numerous.ai"]

  - name: Awin
    url: https://www.awin.com
    best_for: "Former ShareASale parent; open but consumer-retail-skewed (Etsy, Under Armour, AliExpress). NOT devtool-relevant."
    signup: "Free via ui.awin.com/publisher-signup; requires website domain, 1–3 day approval; some programs need $1–$5 refundable deposit."
    payout: "Min $20 (configurable); ACH/BACS/SEPA, wire, Payoneer. No PayPal. Net ~20–30 days."
