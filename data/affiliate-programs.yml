# data/affiliate-programs.yml
# Developer-tool affiliate / referral programs verified 2026-06-29 against official sites.
# Legend in `status`: active | closed | sunset | no_public_program | channel_only.
# Commissions are reference only — re-verify at the official url before promoting.
# IMPORTANT: third-party affiliate directories (OpenAffiliate, AffiliPilot, Awin listings) frequently
# publish programs that do NOT exist on the company's own site. This file only lists programs
# confirmed (or explicitly absent) at the official source.

version: 1
verified_on: "2026-06-29"
caveat: "Commissions/cookies change and programs close. Re-verify at the official url before relying."

